<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — AmigosNearMe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap');

  :root {
    --c-bg:#FAFAF7; --c-surface:#FFFFFF; --c-border:rgba(0,0,0,0.09);
    --c-text:#1A1A18; --c-muted:#6B6B66; --c-hint:#A8A8A2;
    --c-accent:#C94F2B; --c-accent-light:#FAF0EC;
    --c-green:#1D9E75;
    --radius-sm:8px; --radius-md:12px; --radius-xl:22px;
    --font-display:'DM Serif Display',Georgia,serif;
    --font-body:'DM Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-body);background:var(--c-bg);color:var(--c-text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-size:14px;line-height:1.6;padding:20px;
  }
  .card{width:100%;max-width:380px;background:var(--c-surface);border:0.5px solid var(--c-border);border-radius:var(--radius-xl);padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.07)}

  .logo{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .logo-mark{width:30px;height:30px;border-radius:8px;background:var(--c-accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:15px;color:#fff}
  .logo-text{font-family:var(--font-display);font-size:17px}
  .logo-text span{color:var(--c-accent)}

  h2{font-size:20px;font-weight:600;margin:20px 0 4px}
  .sub{font-size:13px;color:var(--c-muted);margin-bottom:22px}

  .field-row{margin-bottom:14px}
  .field-label{font-size:12px;font-weight:500;color:var(--c-muted);margin-bottom:6px;display:block}
  input[type=password]{
    width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:0.5px solid var(--c-border);
    font-size:14px;font-family:var(--font-body);background:#fff;color:var(--c-text);outline:none;transition:border-color 0.12s
  }
  input:focus{border-color:var(--c-accent)}
  .input-error{border-color:var(--c-accent)!important;background:var(--c-accent-light)!important}

  .field-error{display:none;font-size:12px;color:#C94F2B;margin-top:6px;padding:7px 10px;background:var(--c-accent-light);border-radius:6px}
  .field-error.show{display:block}

  .btn{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--c-accent);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:var(--font-body);margin-top:4px;transition:opacity 0.12s}
  .btn:hover{opacity:0.9}
  .btn:disabled{opacity:0.5;cursor:not-allowed}

  .success{display:none;text-align:center;padding:20px 0}
  .success .icon{font-size:40px;margin-bottom:12px}
  .success p{font-size:14px;color:var(--c-muted);margin-bottom:16px}
  .success a{display:inline-block;padding:10px 24px;border-radius:var(--radius-sm);background:var(--c-accent);color:#fff;font-size:14px;font-weight:600;text-decoration:none}

  .invalid-link{display:none;text-align:center;padding:20px 0}
  .invalid-link .icon{font-size:40px;margin-bottom:12px}
  .invalid-link p{font-size:14px;color:var(--c-muted);margin-bottom:16px}
  .invalid-link a{color:var(--c-accent);text-decoration:none;font-weight:500}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">A</div>
    <div class="logo-text">Amigos<span>NearMe</span></div>
  </div>

  <!-- FORM -->
  <div id="form-section">
    <h2>Set new password</h2>
    <p class="sub">Choose a strong password for your account.</p>

    <div class="field-row">
      <label class="field-label">New password</label>
      <input type="password" id="pw-new" placeholder="Min 8 characters" oninput="clearErr()">
    </div>
    <div class="field-row">
      <label class="field-label">Confirm password</label>
      <input type="password" id="pw-confirm" placeholder="Repeat password" oninput="clearErr()">
    </div>
    <div class="field-error" id="err-reset"></div>

    <button class="btn" id="btn-reset" onclick="doReset()">Update password</button>
  </div>

  <!-- SUCCESS -->
  <div class="success" id="section-success">
    <div class="icon">✅</div>
    <p>Your password has been updated successfully.</p>
    <a href="login.html" id="success-link">Go to login</a>
  </div>

  <!-- INVALID LINK -->
  <div class="invalid-link" id="section-invalid">
    <div class="icon">⚠️</div>
    <p>This reset link is invalid or has expired.</p>
    <a href="login.html">Request a new link</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
var _isAdminReset = false;

function clearErr() {
  var el = document.getElementById('err-reset');
  if (el) { el.textContent = ''; el.classList.remove('show'); }
}
function showErr(msg) {
  var el = document.getElementById('err-reset');
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

async function doReset() {
  var pw = document.getElementById('pw-new').value;
  var pw2 = document.getElementById('pw-confirm').value;
  if (pw.length < 8) { showErr('Password must be at least 8 characters.'); return; }
  if (pw !== pw2) { showErr('Passwords do not match.'); return; }

  var btn = document.getElementById('btn-reset');
  btn.textContent = 'Updating…';
  btn.disabled = true;

  try {
    var sb = getSupabase();
    var { error } = await sb.auth.updateUser({ password: pw });
    if (error) throw error;

    document.getElementById('form-section').style.display = 'none';
    document.getElementById('section-success').style.display = 'block';
    // If coming from admin reset, point back to admin-login
    if (_isAdminReset) {
      var link = document.getElementById('success-link');
      if (link) { link.href = 'admin-login.html'; link.textContent = 'Go to admin login'; }
    }
    // Sign out so they log in fresh with new password
    await sb.auth.signOut();
  } catch(e) {
    showErr(e.message || 'Failed to update password. Try requesting a new link.');
    btn.textContent = 'Update password';
    btn.disabled = false;
  }
}

// On load: Supabase appends #access_token=...&type=recovery to the redirect URL.
// The SDK picks this up automatically via onAuthStateChange.
document.addEventListener('DOMContentLoaded', function() {
  var sb = getSupabase();

  // Check if the URL contains a recovery token
  var hash = window.location.hash;
  var isRecovery = hash.includes('type=recovery') || hash.includes('access_token');

  // Detect if this came from admin-login page
  var ref = document.referrer || '';
  _isAdminReset = ref.includes('admin-login') || hash.includes('admin');

  if (!isRecovery) {
    // No token — might be navigated here directly; wait briefly for Supabase session
    setTimeout(function() {
      sb.auth.getSession().then(function(res) {
        if (!res.data || !res.data.session) {
          document.getElementById('form-section').style.display = 'none';
          document.getElementById('section-invalid').style.display = 'block';
        }
      });
    }, 800);
  }

  // Supabase SDK fires PASSWORD_RECOVERY event automatically when token is in URL
  sb.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY') {
      // Session is active — form is ready to use
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('section-invalid').style.display = 'none';
    }
  });
});
</script>
</body>
</html>
