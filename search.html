<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Businesses — AmigosNearMe</title>
<meta name="description" content="Search verified Latin-owned businesses in Atlanta, Georgia. Filter by category, area, language, and rating.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');

  :root {
    --c-bg: #FAFAF7;
    --c-surface: #FFFFFF;
    --c-border: rgba(0,0,0,0.09);
    --c-text: #1A1A18;
    --c-muted: #6B6B66;
    --c-hint: #A8A8A2;
    --c-accent: #C94F2B;
    --c-accent-light: #FAF0EC;
    --c-accent-dark: #9C3A1E;
    --c-green: #1D9E75;
    --c-green-light: #EBF8F3;
    --c-amber: #BA7517;
    --c-amber-light: #FEF6E4;
    --c-blue: #185FA5;
    --c-blue-light: #EEF4FB;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--c-bg); color: var(--c-text); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,247,0.92); backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--c-border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-family: var(--font-display); font-size: 22px; color: var(--c-text); text-decoration: none; }
  .nav-logo span { color: var(--c-accent); }
  .lang-btn { padding: 3px 8px; border-radius: 99px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--c-border); background: transparent; color: var(--c-muted); font-family: var(--font-body); }
  .lang-btn.active { background: var(--c-accent-light); color: var(--c-accent); border-color: var(--c-accent); }
  .btn-nav { font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: var(--radius-sm); text-decoration: none; cursor: pointer; border: 0.5px solid var(--c-border); background: var(--c-surface); color: var(--c-text); font-family: var(--font-body); }
  .btn-nav.primary { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }

  /* SEARCH BAR TOP */
  .search-bar-section {
    background: var(--c-surface);
    border-bottom: 0.5px solid var(--c-border);
    padding: 16px 24px;
  }
  .search-bar-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-input-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--c-hint); pointer-events: none; }
  .search-input { width: 100%; padding: 10px 14px 10px 36px; border-radius: var(--radius-sm); border: 0.5px solid var(--c-border); background: var(--c-bg); font-size: 14px; color: var(--c-text); font-family: var(--font-body); outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--c-accent); }
  .search-go { padding: 10px 20px; border-radius: var(--radius-sm); background: var(--c-accent); color: #fff; border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-body); white-space: nowrap; transition: background 0.15s; }
  .search-go:hover { background: var(--c-accent-dark); }

  /* LAYOUT */
  .page-body { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 260px 1fr; gap: 24px; }

  /* FILTERS SIDEBAR */
  .filters { position: sticky; top: 84px; align-self: start; }
  .filter-card { background: var(--c-surface); border: 0.5px solid var(--c-border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px; }
  .filter-title { font-size: 13px; font-weight: 600; color: var(--c-text); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .filter-clear { font-size: 12px; font-weight: 400; color: var(--c-accent); cursor: pointer; }
  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-option { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--c-muted); cursor: pointer; padding: 5px 8px; border-radius: var(--radius-sm); transition: background 0.12s; }
  .filter-option:hover { background: var(--c-bg); }
  .filter-option input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--c-accent); cursor: pointer; flex-shrink: 0; }
  .filter-option input[type=radio] { width: 15px; height: 15px; accent-color: var(--c-accent); cursor: pointer; flex-shrink: 0; }
  .filter-option span { flex: 1; }
  .filter-count { font-size: 11px; color: var(--c-hint); }
  .filter-group-label { font-size: 11px; font-weight: 600; color: var(--c-hint); letter-spacing: .04em; text-transform: uppercase; padding: 8px 8px 2px; }
  .filter-divider { border: none; border-top: 0.5px solid var(--c-border); margin: 4px 0; }
  .acc-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--c-text); cursor: pointer; margin: 3px 0; background: var(--c-bg); transition: background 0.12s; user-select: none; }
  .acc-header:hover { background: var(--c-border); }
  .acc-arrow { font-size: 10px; color: var(--c-hint); transition: transform 0.2s; }
  .acc-arrow.open { transform: rotate(90deg); }
  .acc-body { display: none; padding-left: 4px; }
  .acc-body.open { display: block; }
  .show-more-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--c-accent); padding: 4px 8px; margin-top: 2px; font-family: var(--font-body); text-align: left; width: 100%; }
  .show-more-btn:hover { text-decoration: underline; }

  /* RESULTS */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .results-count { font-size: 14px; color: var(--c-muted); }
  .results-count strong { color: var(--c-text); }
  .sort-select { font-size: 13px; padding: 7px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--c-border); background: var(--c-surface); color: var(--c-text); font-family: var(--font-body); cursor: pointer; outline: none; }

  /* ACTIVE FILTERS */
  .active-filters { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .active-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 12px; background: var(--c-accent-light); color: var(--c-accent); border: 0.5px solid rgba(201,79,43,0.2); }
  .active-chip button { background: none; border: none; cursor: pointer; color: var(--c-accent); font-size: 14px; line-height: 1; padding: 0; display: flex; align-items: center; }

  /* BIZ CARDS */
  .biz-list { display: flex; flex-direction: column; gap: 12px; }
  .biz-card {
    background: var(--c-surface); border: 0.5px solid var(--c-border);
    border-radius: var(--radius-lg); padding: 20px;
    cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    text-decoration: none; color: inherit; display: block; outline: none; cursor: pointer;
  }
  .biz-card:hover { border-color: rgba(201,79,43,0.3); box-shadow: var(--shadow); }
  /* Save button on cards */
  .btn-save-card {
    padding: 6px 10px; border-radius: 7px; border: 0.5px solid var(--c-border);
    background: var(--c-bg); color: var(--c-muted); font-size: 12px;
    font-weight: 500; cursor: pointer; font-family: var(--font-body);
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-save-card:hover { border-color: var(--c-amber); color: var(--c-amber); }
  .btn-save-card.saved { background: var(--c-amber-light); color: var(--c-amber); border-color: var(--c-amber); }
  .biz-card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
  .biz-avatar { width: 52px; height: 52px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; flex-shrink: 0; }
  .av-coral { background: #FAF0EC; color: var(--c-accent); }
  .av-teal  { background: var(--c-green-light); color: var(--c-green); }
  .av-blue  { background: var(--c-blue-light); color: var(--c-blue); }
  .av-amber { background: var(--c-amber-light); color: var(--c-amber); }
  .av-gray  { background: #F1EFE8; color: #5F5E5A; }
  .biz-info { flex: 1; min-width: 0; }
  .biz-name { font-size: 15px; font-weight: 600; color: var(--c-text); margin-bottom: 3px; }
  .biz-category { font-size: 13px; color: var(--c-muted); margin-bottom: 8px; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-verified { background: var(--c-green-light); color: var(--c-green); }
  .badge-basic { background: #F1EFE8; color: var(--c-hint); }
  .badge-lang { background: var(--c-bg); color: var(--c-muted); border: 0.5px solid var(--c-border); }
  .badge-new { background: var(--c-amber-light); color: var(--c-amber); }
  .badge-pending { background: #F1EFE8; color: var(--c-hint); }
  .biz-distance { font-size: 12px; color: var(--c-hint); white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 3px; }
  .biz-desc { font-size: 13px; color: var(--c-muted); line-height: 1.55; margin-bottom: 14px; }
  .biz-card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .stars { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--c-amber); flex: 1; }
  .stars span { color: var(--c-muted); font-size: 12px; }
  .jobs-completed { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--c-muted); flex: 1; flex-wrap: wrap; }
  .jobs-completed strong { color: var(--c-text); font-weight: 600; }
  .self-reported-tag { font-size: 10px; color: var(--c-hint); font-style: italic; }
  .biz-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-wa { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; background: var(--c-green-light); color: var(--c-green); border: 0.5px solid rgba(29,158,117,0.3); cursor: pointer; font-family: var(--font-body); white-space: nowrap; text-decoration: none; transition: background 0.15s; }
  .btn-wa:hover { background: #d4f0e7; }
  .btn-quote { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; background: var(--c-surface); color: var(--c-text); border: 0.5px solid var(--c-border); cursor: pointer; font-family: var(--font-body); white-space: nowrap; text-decoration: none; transition: background 0.15s; }
  .btn-quote:hover { background: var(--c-bg); }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 28px; }
  .page-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 0.5px solid var(--c-border); background: var(--c-surface); color: var(--c-text); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); transition: all 0.12s; }
  .page-btn:hover { background: var(--c-bg); }
  .page-btn.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
  .page-btn:disabled { opacity: 0.4; cursor: default; }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 60px 20px; color: var(--c-muted); }
  .no-results-icon { font-size: 40px; margin-bottom: 14px; }
  .no-results-title { font-size: 16px; font-weight: 500; color: var(--c-text); margin-bottom: 8px; }

  /* LANG */
  [data-en] { display: none; }
  body.en [data-es] { display: none; }
  body.en [data-en] { display: revert; }

  /* MOBILE */
  @media (max-width: 768px) {
    .page-body { grid-template-columns: 1fr; padding: 12px 14px; gap: 0; }
    .filters { position: static; margin-bottom: 14px; }
    .filters-inner { display: none; } /* collapsed by default on mobile */
    .filters-inner.open { display: block; }
    .filter-toggle-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--c-border); background: var(--c-surface);
      font-size: 13px; font-weight: 500; color: var(--c-text);
      cursor: pointer; font-family: var(--font-body); margin-bottom: 8px;
    }
    nav { padding: 0 16px; }
    .search-bar-section { padding: 10px 14px; }
    .search-bar-inner { flex-wrap: wrap; gap: 8px; }
    .search-go { width: 100%; }
    .result-meta { flex-wrap: wrap; gap: 6px; }
    .sort-select { font-size: 12px; }
    .biz-card { padding: 14px; }
    .biz-name { font-size: 15px; }
    .nav-links { display: none; }
    .btn-nav { font-size: 12px; padding: 7px 10px; }
  }
  /* Filter toggle button hidden on desktop */
  .filter-toggle-btn { display: none; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Amigos<span>NearMe</span></a>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <a href="login.html" class="btn-nav" id="nav-login" style="font-size:13px;color:var(--c-muted);text-decoration:none;padding:8px 12px" data-es-text="Iniciar sesión" data-en-text="Log in">Iniciar sesión</a>
    <a href="register-type.html" class="btn-nav primary" id="nav-cta">Registrar Negocio</a>
  </div>
</nav>

<!-- SEARCH BAR -->
<div class="search-bar-section">
  <div class="search-bar-inner">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

</div>

<!-- BODY -->
<div class="page-body">

  <!-- SIDEBAR FILTERS -->
  <aside class="filters">
    <button class="filter-toggle-btn" onclick="toggleFilters()" id="filter-toggle-btn">
      <span data-es>🔍 Filtros</span><span data-en>🔍 Filters</span>
      <span id="filter-toggle-arrow">▼</span>
    </button>
    <div class="filters-inner" id="filters-inner">

    <div class="filter-card">
      <div class="filter-title">
        <span id="filter-title-cat" data-i18n-es="Categoría" data-i18n-en="Category">Categoría</span>
        <span class="filter-clear i18n-clear" onclick="clearFilter('cat')" data-i18n-es="Limpiar" data-i18n-en="Clear">Limpiar</span>
      </div>
      <div class="filter-group" id="filter-cat">
        <label class="filter-option"><input type="checkbox" value="staffing" onchange="filterChange()"> <span data-es-text="👷 Personal y Mano de Obra" data-en-text="👷 Staffing & Labor">👷 Personal y Mano de Obra</span> <span class="filter-count"></span></label>
        <label class="filter-option"><input type="checkbox" value="landscaping" onchange="filterChange()"> <span data-es-text="🌿 Landscaping" data-en-text="🌿 Landscaping">🌿 Landscaping</span> <span class="filter-count"></span></label>
        <label class="filter-option"><input type="checkbox" value="cleaning" onchange="filterChange()"> <span data-es-text="🧹 Limpieza" data-en-text="🧹 Cleaning">🧹 Limpieza</span> <span class="filter-count"></span></label>
        <label class="filter-option"><input type="checkbox" value="construction" onchange="filterChange()"> <span data-es-text="🏗️ Construcción" data-en-text="🏗️ Construction">🏗️ Construcción</span> <span class="filter-count"></span></label>
        <label class="filter-option"><input type="checkbox" value="painting" onchange="filterChange()"> <span data-es-text="🪟 Pintura" data-en-text="🪟 Painting">🪟 Pintura</span> <span class="filter-count"></span></label>
        <label class="filter-option"><input type="checkbox" value="real_estate" onchange="filterChange()"> <span data-es-text="🏠 Agente Inmobiliario" data-en-text="🏠 Real Estate">🏠 Agente Inmobiliario</span> <span class="filter-count"></span></label>
        <div id="cat-more" style="display:none">
          <label class="filter-option"><input type="checkbox" value="plumbing" onchange="filterChange()"> <span data-es-text="🔧 Plomería" data-en-text="🔧 Plumbing">🔧 Plomería</span> <span class="filter-count"></span></label>
          <label class="filter-option"><input type="checkbox" value="electrical" onchange="filterChange()"> <span data-es-text="⚡ Electricidad" data-en-text="⚡ Electrical">⚡ Electricidad</span> <span class="filter-count"></span></label>
          <label class="filter-option"><input type="checkbox" value="moving" onchange="filterChange()"> <span data-es-text="📦 Mudanzas" data-en-text="📦 Moving">📦 Mudanzas</span> <span class="filter-count"></span></label>
          <label class="filter-option"><input type="checkbox" value="food" onchange="filterChange()"> <span data-es-text="🍽️ Comida" data-en-text="🍽️ Food & Catering">🍽️ Comida</span> <span class="filter-count"></span></label>
          <label class="filter-option"><input type="checkbox" value="auto" onchange="filterChange()"> <span data-es-text="🚗 Autos" data-en-text="🚗 Auto Repair">🚗 Autos</span> <span class="filter-count"></span></label>
          <label class="filter-option"><input type="checkbox" value="translation" onchange="filterChange()"> <span data-es-text="🗣️ Traducción" data-en-text="🗣️ Translation">🗣️ Traducción</span> <span class="filter-count"></span></label>
          <label class="filter-option"><input type="checkbox" value="tree_removal" onchange="filterChange()"> <span data-es-text="🌳 Árboles" data-en-text="🌳 Tree Removal">🌳 Árboles</span> <span class="filter-count"></span></label>
        </div>
        <button class="show-more-btn" id="cat-more-btn" onclick="toggleMore('cat')">
          <span data-es-text="+ Ver 7 más" data-en-text="+ Show 7 more">+ Ver 7 más</span>
        </button>
      </div>
    </div>

    <div class="filter-card">
      <div class="filter-title">
        <span id="filter-title-area" data-i18n-es="Área" data-i18n-en="Area">Área</span>

          <label class="filter-option"><input type="checkbox" value="johns_creek" onchange="filterChange()"> <span>Johns Creek</span></label>

          <label class="filter-option"><input type="checkbox" value="dunwoody" onchange="filterChange()"> <span>Dunwoody</span></label>
          <label class="filter-option"><input type="checkbox" value="lithonia" onchange="filterChange()"> <span>Lithonia</span></label>
          <label class="filter-option"><input type="checkbox" value="pine_lake" onchange="filterChange()"> <span>Pine Lake</span></label>

        <div class="acc-header" onclick="toggleAcc('acc-cobb')">
          <span>Cobb</span><span class="acc-arrow" id="arr-cobb">▸</span>

        <div class="acc-body" id="acc-cobb">

async function openBizWhatsApp(bizId, phone, msg, bizEmail, bizName, plan, usedCached) {
  var PLAN_LIMITS = { free: 3, basic: 10, premium: Infinity };
  var limit = PLAN_LIMITS[plan] !== undefined ? PLAN_LIMITS[plan] : Infinity;

  // 실시간 DB 조회로 최신 contacts_used_month 확인
  var used = usedCached;
  try {
    var sb = getSupabase();
    var { data } = await sb.from('businesses').select('contacts_used_month').eq('id', bizId).single();
    if (data) used = data.contacts_used_month || 0;
  } catch(e) {}

  if (used >= limit) {
    var isEn = document.body.classList.contains('en');
    var planName = plan.charAt(0).toUpperCase() + plan.slice(1);
    var limitNum = isFinite(limit) ? limit : '∞';
    alert(isEn
      ? 'This business has reached its ' + limitNum + ' request limit for this month (' + planName + ' plan).'
      : 'Este negocio alcanzó su límite de ' + limitNum + ' solicitudes del mes (plan ' + planName + ').');
    return;
  }

  window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');

  var sb2 = getSupabase();
  if (bizId) {
    sb2.rpc('increment_contact_count', { p_biz_id: bizId }).then(function(){});
    sb2.auth.getSession().then(function(r) {
      var uid = r && r.data && r.data.session ? r.data.session.user.id : null;
      sb2.from('contact_log').insert({ biz_id: bizId, customer_id: uid, channel: 'whatsapp', limit_hit: false }).then(function(){});
    });
    if (bizEmail) {
      try { sendEmail('SB6', bizEmail, { biz_name: bizName }); } catch(e) {}
    }
  }
}

function getSavedBusinesses() {
  try { return JSON.parse(localStorage.getItem('anm-saved-businesses') || '[]'); } catch(e) { return []; }
}
function setSavedBusinesses(list) {
  try { localStorage.setItem('anm-saved-businesses', JSON.stringify(list)); } catch(e) {}
}

function toggleSaveFromCard(btn, bizId, bizName, bizCat, bizArea) {
  event.stopPropagation();
  var loggedIn = false;
  try { loggedIn = localStorage.getItem('anm-sim-logged-in') === '1'; } catch(e) {}
  if (!loggedIn) {
    try { sessionStorage.setItem('anm-save-redirect', window.location.href); } catch(e) {}
    window.location.href = 'login.html?type=customer';
    return;
  }
  var saved = getSavedBusinesses();
  var idx = saved.findIndex(function(s){ return s.id === bizId; });
  var isEn = document.body.classList.contains('en');
  if (idx === -1) {
    saved.push({ id: bizId, name: bizName, category: bizCat, area: bizArea, savedAt: Date.now() });
    setSavedBusinesses(saved);
    btn.textContent = '★';
    btn.classList.add('saved');
    btn.title = isEn ? 'Saved' : 'Guardado';
  } else {
    saved.splice(idx, 1);
    setSavedBusinesses(saved);
    btn.textContent = '☆';
    btn.classList.remove('saved');
    btn.title = isEn ? 'Save' : 'Guardar';
  }
}

function injectSaveButtons() {
  var saved = getSavedBusinesses();
  var savedIds = saved.map(function(s){ return s.id; });
  var isEn = document.body.classList.contains('en');

  document.querySelectorAll('.biz-card[data-id]').forEach(function(card) {
    var bizId = card.getAttribute('data-id');
    var actions = card.querySelector('.biz-actions');
    if (!actions || actions.querySelector('.btn-save-card')) return; // already injected

    var isSaved = savedIds.indexOf(bizId) !== -1;
    var bizName = card.querySelector('.biz-name') ? card.querySelector('.biz-name').textContent : bizId;
    var bizCat = card.querySelector('.biz-category') ? card.querySelector('.biz-category').textContent : '';
    var bizArea = '';

    var btn = document.createElement('button');
    btn.className = 'btn-save-card' + (isSaved ? ' saved' : '');
    btn.textContent = isSaved ? '★' : '☆';
    btn.title = isSaved ? (isEn ? 'Saved' : 'Guardado') : (isEn ? 'Save' : 'Guardar');
    btn.setAttribute('aria-label', isEn ? 'Save business' : 'Guardar negocio');
    btn.onclick = function(e) { toggleSaveFromCard(btn, bizId, bizName, bizCat, bizArea); };
    actions.appendChild(btn);
  });
}

function updateActiveChips(cats, areas, minRating, verifiedOnly) {
  var wrap = document.getElementById('active-filters');
  if (!wrap) return;
  wrap.innerHTML = '';
  var isEn = document.body.classList.contains('en');

  function makeChip(label, removeFn) {
    var chip = document.createElement('span');
    chip.className = 'active-chip';
    chip.textContent = label + ' ';
    var btn = document.createElement('button');
    btn.textContent = 'x';
    btn.onclick = removeFn;
    chip.appendChild(btn);
    wrap.appendChild(chip);
  }

  cats.forEach(function(c) { makeChip(c, function(){ removeCatFilter(c); }); });
  areas.forEach(function(a) { makeChip(a, function(){ removeAreaFilter(a); }); });

  if (verifiedOnly) { makeChip(isEn ? 'Verified only' : 'Solo verificados', clearVerified); }

function stripAccents(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Maps each category slug to ALL the display names a user might type to find it —
// the slug-to-label text shown only in the filter checkboxes, not on the cards themselves.
var CATEGORY_SEARCH_TERMS = {
  landscaping: 'paisajismo landscaping',
  cleaning: 'limpieza cleaning',
  construction: 'construccion construction',
  painting: 'pintura painting',
  realestate: 'agente inmobiliario real estate',
  plumbing: 'plomeria plumbing',
  electrical: 'electricidad electrical',
  moving: 'mudanzas moving',
  food: 'comida food catering',
  auto: 'autos auto repair',
  translation: 'traduccion translation',
  tree: 'arboles tree removal',
  staffing: 'personal y mano de obra staffing labor'
};

function applySearch() {
  var qRaw = document.getElementById('main-search').value.trim().toLowerCase();
  var q = stripAccents(qRaw);
  var cards = document.querySelectorAll('.biz-card');
  var visible = 0;
  cards.forEach(function(card) {
    // Match against: visible text, the category slug, both language variants of every
    // translated field, and the category's full display name(s) (which only appear in the
    // filter sidebar, not on the card itself — e.g. searching "Staffing" or "Personal y
    // Mano de Obra" should find cards whose visible copy never spells out the category name).
    // Accents are stripped on both sides so "Plomeria" matches "Plomería".
    var text = card.textContent.toLowerCase();
    var catSlug = (card.dataset.cat || '').toLowerCase();
    var catTerms = CATEGORY_SEARCH_TERMS[catSlug] || '';
    var i18nText = Array.from(card.querySelectorAll('[data-es-text],[data-en-text]'))
      .map(function(el) { return (el.getAttribute('data-es-text') || '') + ' ' + (el.getAttribute('data-en-text') || ''); })
      .join(' ').toLowerCase();
    var haystack = stripAccents(text + ' ' + catSlug + ' ' + catTerms + ' ' + i18nText);
    var show = !q || haystack.indexOf(q) !== -1;
    card.style.display = show ? 'block' : 'none';
    if (show) visible++;
  });
  var numEl = document.getElementById('count-num');
  if (numEl) numEl.textContent = visible;
}
var currentSort = 'recommended';
function sortChange(val) {
  currentSort = val;
  applyFiltersAndRender();
}

function sortResults(results) {
  var sorted = results.slice();
  if (currentSort === 'rating') {
    sorted.sort(function(a,b){ return (parseFloat(b.rating)||0) - (parseFloat(a.rating)||0); });
  } else if (currentSort === 'newest') {
    sorted.sort(function(a,b){ return new Date(b.created_at||0) - new Date(a.created_at||0); });
  } else {
    // recommended: effective_score (priority_score + premium bonus) desc, then verified, then name
    sorted.sort(function(a,b){
      var scoreA = (a.priority_score || 0) + (a.plan === 'premium' ? 10 : 0);
      var scoreB = (b.priority_score || 0) + (b.plan === 'premium' ? 10 : 0);
      if (scoreB !== scoreA) return scoreB - scoreA;
      if (b.verified !== a.verified) return b.verified ? 1 : -1;
      return (a.business_name||'').localeCompare(b.business_name||'');
    });
  }
  return sorted;
}

}

var currentPage = 1;
var pageSize = 10;
var allResults = [];

async function loadBusinesses() {
  var loadingMsg = document.getElementById('loading-msg');
  var isEn = document.body.classList.contains('en');
  try {
    const sb = getSupabase();
    var { data, error } = await sb
      .from('businesses')
      .select('*')
      .order('verified', { ascending: false })
      .order('business_name', { ascending: true });

    if (error) throw error;
    allResults = data || [];
    updateCategoryCounts();
    applyFiltersAndRender();
  } catch(e) {
    console.error('Load error:', e);
    if (loadingMsg) loadingMsg.innerHTML = '<span>' + (isEn ? 'Error loading. Please refresh.' : 'Error al cargar. Recarga la página.') + '</span>';
  }
}

function updateCategoryCounts() {
  var catValues = ['staffing','landscaping','cleaning','construction','painting','realestate','plumbing','electrical','moving','food','auto','translation','tree','real_estate','tree_removal'];
  catValues.forEach(function(val) {
    var count = allResults.filter(function(b){
      return (b.categories||[]).some(function(c){
        return c === val || c === val.replace(/_/g,'') || c.replace(/_/g,'') === val;
      });
    }).length;
    var inputs = document.querySelectorAll('#filter-cat input[value="' + val + '"]');
    inputs.forEach(function(inp){
      var countEl = inp.closest('label') ? inp.closest('label').querySelector('.filter-count') : null;
      if (countEl) countEl.textContent = count || '';
    });
  });
}

function applyFiltersAndRender() {
  var cats = getActiveCats();
  var areas = getActiveAreas();
  var minRating = getMinRating();
  var verifiedOnly = getVerifiedOnly();
  var q = (document.getElementById('main-search')?.value || '').toLowerCase().trim();

  // Language filter
  var langEs = document.getElementById('f-es')?.checked;
  var langPt = document.getElementById('f-pt')?.checked;
  var langEn = document.getElementById('f-en2')?.checked;
  var activeLangs = [];
  if (langEs) activeLangs.push('es');
  if (langPt) activeLangs.push('pt');
  if (langEn) activeLangs.push('en');

  var filtered = allResults.filter(function(biz) {
    if (verifiedOnly && !biz.verified) return false;
    if (cats.length > 0) {
      var bizCats = biz.categories || [];
      if (!cats.some(function(c){ return bizCats.some(function(bc){ return bc === c || bc.replace(/_/g,'') === c.replace(/_/g,''); }); })) return false;
    }
    if (areas.length > 0) {
      var bizArea = (biz.service_area || '').toLowerCase();
      if (!areas.some(function(a){ return bizArea.includes(a) || bizArea.includes(a.replace(/_/g,' ')); })) return false;
    }
    if (activeLangs.length > 0) {
      var bizLangs = biz.languages || [];
      if (!activeLangs.some(function(l){ return bizLangs.includes(l); })) return false;
    }
    if (q) {
      var searchable = (biz.business_name + ' ' + biz.trade_name + ' ' + (biz.description||'') + ' ' + (biz.service_area||'')).toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    if (minRating) {
      var bizRating = parseFloat(biz.rating) || 0;
      if (bizRating < minRating) return false;
    }
    return true;
  });

  filtered = sortResults(filtered);
  filteredRef = filtered;

  var numEl = document.getElementById('count-num');
  if (numEl) numEl.textContent = filtered.length;

  updateActiveChips(cats, areas, minRating, verifiedOnly);
  currentPage = 1;
  renderPage(filtered);
}

function renderPage(filtered) {
  var list = document.getElementById('biz-list');
  if (!list) return;
  var isEn = document.body.classList.contains('en');

  var start = (currentPage - 1) * pageSize;
  var page = filtered.slice(start, start + pageSize);

  if (page.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--c-hint);font-size:14px"><div style="font-size:32px;margin-bottom:12px">🔍</div><span>' + (isEn ? 'No businesses found. Try different filters.' : 'No se encontraron negocios. Intenta otros filtros.') + '</span></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  var catLabelsEs = { landscaping:'🌿 Landscaping', cleaning:'🧹 Limpieza', construction:'🏗️ Construcción', plumbing:'🔧 Plomería', electrical:'⚡ Electricidad', painting:'🪟 Pintura', tree_removal:'🌳 Árboles', moving:'📦 Mudanzas', food:'🍽️ Comida', auto:'🚗 Autos', translation:'🗣️ Traducción', staffing:'👷 Personal', real_estate:'🏠 Bienes Raíces' };
  var catLabelsEn = { landscaping:'🌿 Landscaping', cleaning:'🧹 Cleaning', construction:'🏗️ Construction', plumbing:'🔧 Plumbing', electrical:'⚡ Electrical', painting:'🪟 Painting', tree_removal:'🌳 Tree Removal', moving:'📦 Moving', food:'🍽️ Food & Catering', auto:'🚗 Auto Repair', translation:'🗣️ Translation', staffing:'👷 Staffing', real_estate:'🏠 Real Estate' };
  var catLabels = isEn ? catLabelsEn : catLabelsEs;
  var colors = ['av-coral','av-teal','av-amber','av-blue','av-green','av-purple'];

  list.innerHTML = page.map(function(biz, idx) {
    var initials = (biz.business_name || '').split(' ').slice(0,2).map(function(w){ return w[0]||''; }).join('').toUpperCase() || '??';
    var color = colors[idx % colors.length];
    var cat = (biz.categories || [])[0] || '';
    var catLabel = (biz.categories || []).map(function(c){ return catLabels[c] || c; }).join(' · ') || cat;
    var area = biz.service_area || '';
    var areaShort = area.split(',').slice(0,2).join(',').trim();
    var rating = biz.rating || '';
    var ratingHtml = rating ? '<span style="color:var(--c-amber)">★</span> ' + parseFloat(rating).toFixed(1) : '';
    var verifiedHtml = biz.verified ? '<span style="background:var(--c-green-light);color:var(--c-green);font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500">✓ Verified</span>' : '';
    var insuredHtml = biz.insured ? '<span style="background:#EEF6FF;color:#2563EB;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500">🛡️ ' + (isEn ? 'Insured' : 'Asegurado') + '</span>' : '';
    var phone = (biz.whatsapp_phone || '').replace(/\D/g,'');
    var waMsg = isEn ? 'Hi! I found you on AmigosNearMe.' : 'Hola! Te encontré en AmigosNearMe.';
    var waSB6Click = biz.public_email ? 'sendEmail(\'SB6\',\'' + biz.public_email + '\',{biz_name:\'' + (biz.business_name||'').replace(/'/g,"\\'") + '\'});' : '';

    var thumbUrl = (biz.photos && biz.photos.length > 0) ? biz.photos[0] : null;
    var avatarHtml = thumbUrl
      ? '<img src="' + thumbUrl + '" style="width:52px;height:52px;border-radius:var(--radius-md);object-fit:contain;background:var(--c-bg);flex-shrink:0" alt="">'
      : '<div class="biz-avatar ' + color + '">' + initials + '</div>';

    return '<div class="biz-card" data-id="' + biz.id + '" data-cat="' + cat + '" data-area="' + areaShort + '" data-rating="' + (rating||0) + '" data-verified="' + !!biz.verified + '" onclick="goToProfile(\'' + biz.id + '\')">' +
      '<div class="biz-card-top">' +
      avatarHtml +
      '<div style="flex:1;min-width:0">' +
      '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">' +
      '<div class="biz-name" style="font-size:15px;font-weight:600">' + (biz.business_name || '') + '</div>' +
      verifiedHtml + insuredHtml + '</div>' +
      '<div class="biz-category" style="font-size:12px;color:var(--c-muted)">' + catLabel + (areaShort ? ' · ' + areaShort : '') + '</div>' +
      (rating ? '<div style="font-size:12px;color:var(--c-muted);margin-top:2px">' + ratingHtml + '</div>' : '') +
      '</div></div>' +
      '<div class="biz-card-bottom">' +
      (phone ? '<button onclick="event.stopPropagation();openBizWhatsApp(\'' + biz.id + '\',\'' + phone + '\',' + JSON.stringify(waMsg) + ',' + JSON.stringify(biz.public_email||'') + ',' + JSON.stringify(biz.business_name||'') + ',\'' + (biz.plan||'free') + '\',' + (biz.contacts_used_month||0) + ')" class="btn-wa" style="font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);background:var(--c-green-light);color:var(--c-green);border:0.5px solid rgba(29,158,117,0.3);cursor:pointer;font-weight:500;font-family:var(--font-body)">💬 WhatsApp</button>' : '') +
      '</div></div>';
  }).join('');

  // Pagination
  var totalPages = Math.ceil(filtered.length / pageSize);
  var pagEl = document.getElementById('pagination');
  if (pagEl) {
    if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
    var html = '<button class="page-btn" onclick="changePage(' + (currentPage-1) + ',filteredRef)" ' + (currentPage===1?'disabled':'') + '>‹</button>';
    for (var p = 1; p <= totalPages; p++) {
      html += '<button class="page-btn' + (p===currentPage?' active':'') + '" onclick="changePage(' + p + ',filteredRef)">' + p + '</button>';
    }
    html += '<button class="page-btn" onclick="changePage(' + (currentPage+1) + ',filteredRef)" ' + (currentPage===totalPages?'disabled':'') + '>›</button>';
    pagEl.innerHTML = html;
  }
}

var filteredRef = [];

function changePage(p, filtered) {
  currentPage = p;
  renderPage(filtered || filteredRef);
  window.scrollTo({top:0, behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', async function() {
  var saved = ''; try { saved = localStorage.getItem('anm-lang'); } catch(e) {}
  var browser = (navigator.language || 'es').toLowerCase();
  var lang = saved || (browser.startsWith('en') ? 'en' : 'es');
  setLang(lang);

  await loadBusinesses();

  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  var cat = params.get('cat');
  if (q) { var ms = document.getElementById('main-search'); if (ms) { ms.value = q; applyFiltersAndRender(); } }
  if (cat) { var cb = document.querySelector('#filter-cat input[value="'+cat+'"]'); if (cb) { cb.checked = true; applyFiltersAndRender(); } }

  // Verified status comes directly from DB (businesses.verified column) — no localStorage sync needed.

  // Inject save buttons on all business cards
  injectSaveButtons();

  // 로그인 상태에 따라 nav 버튼 교체
  try {
    var sess = await getSession();
    var isEn = document.body.classList.contains('en');
    var loginEl = document.getElementById('nav-login');
    var ctaEl   = document.getElementById('nav-cta');
    if (sess && sess.user && loginEl) {
      var utype = (sess.user.user_metadata && sess.user.user_metadata.user_type) || '';
      var dashHref = utype === 'employer' ? 'employer-dashboard.html'
                   : utype === 'business' ? 'dashboard.html'
                   : 'index.html';
      if (utype === 'worker') {
        try { var wb = await getMyBusiness(); if (wb && wb.id) dashHref = 'worker-profile.html?id=' + wb.id; } catch(e) {}
      }
      loginEl.href = dashHref;
      loginEl.textContent = isEn ? 'My Account' : 'Mi Cuenta';
      if (ctaEl) ctaEl.style.display = 'none';

      var logoutBtn = document.createElement('button');
      logoutBtn.textContent = isEn ? 'Log out' : 'Cerrar sesión';
      logoutBtn.className = 'btn-nav';
      logoutBtn.style.cssText = 'font-size:13px;color:var(--c-muted);background:none;border:none;cursor:pointer;padding:8px 12px';
      logoutBtn.onclick = async function() { try { await signOut(); } catch(e) {} window.location.href = 'index.html'; };
      loginEl.parentNode.insertBefore(logoutBtn, loginEl.nextSibling);
    }
  } catch(e) {}
});
</script>
</body>
